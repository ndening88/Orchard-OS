<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>Orchard OS</title>
    <meta name="description" content="Smart walnut farm management — activities, field logs, data, weather and AI advisor." />

    <!-- ── PWA / installability ── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#161b22" />

    <!-- ── iOS specific ── -->
    <!-- Makes it launch full-screen (no Safari chrome) when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orchard OS" />
    <!-- iOS home screen icon (generated below) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Splash screens for iPhone / iPad (optional but polished) ── -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
      href="/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 / 13 -->
    <link rel="apple-touch-startup-image"
      href="/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image"
      href="/splash-2048x2732.png"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad 10th gen / Air -->
    <link rel="apple-touch-startup-image"
      href="/splash-1640x2360.png"
      media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- ── Android / Chrome ── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Prevent iOS auto-formatting phone numbers ── -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #0d1117;
        min-height: 100vh;
        min-height: 100dvh;
      }
      /* iOS safe area support */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        -webkit-text-size-adjust: 100%;
      }
      /* Prevent iOS long-press selection on UI elements */
      button, select { -webkit-user-select: none; user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
